
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Meta tag obligatoria para diseño adaptativo en móviles -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torneo Nacional de eSports</title>
    
    <!-- Importando fuente moderna (Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Reseteo básico y variables */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            color: #1a1a1a;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .galeria-juegos {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap; /* Permite que bajen de línea en móviles */
        }

        .galeria-juegos img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .galeria-juegos img:hover {
            transform: translateY(-5px);
        }

        .contenedor-formulario {
            max-width: 500px;
            margin: 0 auto 40px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

        .grupo-campo {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #444;
        }

        input[type="text"],
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: #0b57d0;
            box-shadow: 0 0 0 3px rgba(11, 87, 208, 0.1);
        }

        .checkbox-grupo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox-grupo input[type="checkbox"] {
            width: 18px;
            height: 18px;
        }

        button[type="submit"] {
            width: 100%;
            padding: 14px;
            background-color: #0b57d0;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button[type="submit"]:hover {
            background-color: #0842a0;
        }

        .contenedor-tabla {
            max-width: 800px;
            margin: 0 auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden; /* Necesario para que los bordes redondeados apliquen a la cabecera */
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        thead {
            background-color: #1a1a1a;
            color: white;
        }

        th, td {
            padding: 15px;
            text-align: left;
        }

        th {
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        tbody tr {
            border-bottom: 1px solid #eee;
        }

        /* Efecto Cebra */
        tbody tr:nth-child(even) {
            background-color: #f9fbfd;
        }

        tbody tr:hover {
            background-color: #f0f4f9;
        }

    </style>
</head>
<body>

    <header>
        <h1>Torneo Nacional de eSports</h1>
        <p>Inscríbete en tu disciplina favorita y demuestra tu nivel.</p>
    </header>

    <!-- Imágenes en paralelo usando Flexbox -->
    <section class="galeria-juegos">
        <img src="https://placehold.co/200x200/1a1a1a/0b57d0?text=League+of+Legends" alt="Logo LoL">
        <img src="https://placehold.co/200x200/1a1a1a/d32f2f?text=Valorant" alt="Logo Valorant">
        <img src="https://placehold.co/200x200/1a1a1a/fbc02d?text=CS:GO" alt="Logo CSGO">
    </section>

    <section class="contenedor-formulario">
        <h2>Ficha de Inscripción</h2>
        <br>
        <!-- ACTION apunta al Servlet y METHOD es POST -->
        <form action="InscripcionServlet" method="POST">
            
            <div class="grupo-campo">
                <label for="id_alias">Alias del Jugador (Nick):</label>
                <!-- name="alias_jugador" es lo que lee el Java -->
                <input type="text" id="id_alias" name="alias_jugador" placeholder="Ej: Faker" required>
            </div>

            <div class="grupo-campo">
                <label for="id_juego">Selecciona tu Juego:</label>
                <!-- name="juego_seleccionado" -->
                <select id="id_juego" name="juego_seleccionado" required>
                    <option value="">-- Elige una opción --</option>
                    <option value="League of Legends">League of Legends</option>
                    <option value="Valorant">Valorant</option>
                    <option value="CS:GO">Counter-Strike: GO</option>
                </select>
            </div>

            <div class="grupo-campo">
                <label for="id_equipo">Equipo Actual (Opcional):</label>
                <!-- name="nombre_equipo" -->
                <input type="text" id="id_equipo" name="nombre_equipo" placeholder="Ej: T1, KOI, G2...">
            </div>

            <div class="grupo-campo checkbox-grupo">
                <!-- name="acepta_terminos" -->
                <input type="checkbox" id="id_terminos" name="acepta_terminos" value="si" required>
                <label for="id_terminos" style="margin-bottom: 0;">He leído y acepto las reglas del torneo.</label>
            </div>

            <button type="submit">Confirmar Inscripción</button>
        </form>
    </section>

    <section class="contenedor-tabla">
        <h2 style="text-align: center; margin-bottom: 20px;">Campeones de la Edición Anterior</h2>
        <table>
            <thead>
                <tr>
                    <th>Alias</th>
                    <th>Juego</th>
                    <th>Equipo</th>
                    <th>Premio</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Caps</td>
                    <td>League of Legends</td>
                    <td>G2 Esports</td>
                    <td>$50,000</td>
                </tr>
                <tr>
                    <td>TenZ</td>
                    <td>Valorant</td>
                    <td>Sentinels</td>
                    <td>$35,000</td>
                </tr>
                <tr>
                    <td>S1mple</td>
                    <td>CS:GO</td>
                    <td>Natus Vincere</td>
                    <td>$45,000</td>
                </tr>
            </tbody>
        </table>
    </section>

</body>
</html>
