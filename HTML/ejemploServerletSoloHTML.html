<!-- STREAMING_CHUNK: Cabecera y conexión con CSS externo -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agencia de Viajes - Frontend</title>
    
    <!-- AQUÍ SE VINCULA EL ARCHIVO CSS EXTERNO -->
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <h1>Agencia de Viajes "El Mundo"</h1>

    <!-- STREAMING_CHUNK: Estructura de la Galería -->
    <section>
        <h2>Nuestros Destinos Top</h2>
        <div class="galeria-destinos">
            <img src="https://placehold.co/400x300/2c3e50/white?text=París" alt="Viaje a París">
            <img src="https://placehold.co/400x300/e76f51/white?text=Tokio" alt="Viaje a Tokio">
            <img src="https://placehold.co/400x300/2a9d8f/white?text=Roma" alt="Viaje a Roma">
        </div>
    </section>

    <!-- STREAMING_CHUNK: Estructura de la Tabla -->
    <section class="contenedor-tabla">
        <h2>Tarifas Base (Por Noche)</h2>
        <table>
            <thead>
                <tr>
                    <th>Destino</th>
                    <th>Continente</th>
                    <th>Precio Base</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>París</td>
                    <td>Europa</td>
                    <td>120€</td>
                </tr>
                <tr>
                    <td>Tokio</td>
                    <td>Asia</td>
                    <td>150€</td>
                </tr>
                <tr>
                    <td>Roma</td>
                    <td>Europa</td>
                    <td>95€</td>
                </tr>
            </tbody>
        </table>
    </section>

    <!-- STREAMING_CHUNK: Estructura del Formulario -->
    <section class="contenedor-formulario">
        <h2>Reserva tu Viaje</h2>
        
        <form action="ReservaViajesServlet" method="POST">
            
            <div class="grupo-form">
                <label for="nombre">Nombre del Cliente:</label>
                <input type="text" id="nombre" name="nombre_cliente" required placeholder="Ej: Laura García">
            </div>

            <div class="grupo-form">
                <label for="destino">Destino Elegido:</label>
                <select id="destino" name="destino_elegido" required>
                    <option value="">Selecciona un lugar...</option>
                    <option value="París">París</option>
                    <option value="Tokio">Tokio</option>
                    <option value="Roma">Roma</option>
                    <option value="Nueva York">Nueva York</option>
                </select>
            </div>

            <div class="grupo-form">
                <label for="pasajeros">Número de Pasajeros:</label>
                <input type="number" id="pasajeros" name="numero_pasajeros" min="1" max="10" required value="1">
            </div>

            <div class="grupo-form">
                <label>Tipo de Alojamiento:</label>
                <div class="grupo-radio">
                    <label><input type="radio" name="tipo_alojamiento" value="Hotel" required> Hotel</label>
                    <label><input type="radio" name="tipo_alojamiento" value="Apartamento"> Apartamento</label>
                    <label><input type="radio" name="tipo_alojamiento" value="Hostel"> Hostel</label>
                </div>
            </div>

            <div class="grupo-form">
                <div class="grupo-checkbox">
                    <label>
                        <input type="checkbox" name="acepta_politica" value="si" required> 
                        He leído y acepto la política de cancelación.
                    </label>
                </div>
            </div>

            <button type="submit">Confirmar Reserva</button>
        </form>
    </section>

</body>
</html>
